volumes:
  database:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: ./data/database
  prometheus_data:
  grafana_data:

services:
  database:
    container_name: database
    networks:
      - unicord
    image: mariadb:12
    env_file: .env
    volumes:
      - database:/var/lib/mysql
    restart: unless-stopped
    expose:
      - "3306"

  nginx:
    container_name: nginx
    networks:
      - unicord
    depends_on:
      - frontend
      - backend
    build:
      context: ./nginx
      args:
        FRONTEND_DOMAIN: ${FRONTEND_DOMAIN}
        BACKEND_DOMAIN: ${BACKEND_DOMAIN}
    env_file: .env
    restart: unless-stopped
    ports:
      - "443:443"

  backend:
    container_name: backend
    networks:
      - unicord
    volumes:
      - ./data/uploads:/app/uploads
    depends_on:
      - database
    build: ./backend
    env_file: .env
    restart: unless-stopped
    ports:
      - "3000:3000"
    expose:
      - "443"

  frontend:
    container_name: frontend
    networks:
      - unicord
    depends_on:
      - backend
    build: ./frontend
    env_file: .env
    restart: unless-stopped
    expose:
      - "3001"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      - unicord
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - unicord
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

networks:
  unicord:
    name: unicord
    driver: bridge
