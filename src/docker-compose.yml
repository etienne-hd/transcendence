volumes:
  database:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: ./data/database

services:
  database:
    container_name: database
    networks:
    - unicord
    build: ./database
    env_file: .env
    volumes:
    - database:/var/lib/mysql
    restart: unless-stopped
    expose:
    - "3306"

networks:
  unicord:
    name: unicord
    driver: bridge